<div class="my-projects">
  <mat-card>
    <mat-card-title>My Projects</mat-card-title>
    <mat-card-content>
      <div class="projects-grid">
        <mat-card class="project-card" *ngFor="let project of myProjects">
          <mat-card-header>
            <mat-card-title>{{ project.title }}</mat-card-title>
            <mat-card-subtitle>{{ project.technology }}</mat-card-subtitle>
          </mat-card-header>

          <mat-card-content>
            <p>{{ project.description }}</p>
          </mat-card-content>

          <mat-card-actions>
            <button mat-raised-button color="primary">
              <mat-icon>download</mat-icon> Download
            </button>
            <button mat-raised-button>
              <mat-icon>visibility</mat-icon> View Details
            </button>
            <button mat-raised-button color="accent">
              <mat-icon>description</mat-icon> Project Report
            </button>
          </mat-card-actions>
        </mat-card>
      </div>
    </mat-card-content>
  </mat-card>
</div>
