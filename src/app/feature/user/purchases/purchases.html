<div class="my-purchases">
  <mat-card>
    <mat-card-title>My Purchases</mat-card-title>
    <mat-card-content>
      <table mat-table [dataSource]="purchases" class="mat-elevation-z2">

        <!-- Project Name Column -->
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef> Project Name </th>
          <td mat-cell *matCellDef="let purchase"> {{purchase.name}} </td>
        </ng-container>

        <!-- Date Column -->
        <ng-container matColumnDef="date">
          <th mat-header-cell *matHeaderCellDef> Date </th>
          <td mat-cell *matCellDef="let purchase"> {{purchase.date}} </td>
        </ng-container>

        <!-- Amount Column -->
        <ng-container matColumnDef="amount">
          <th mat-header-cell *matHeaderCellDef> Amount </th>
          <td mat-cell *matCellDef="let purchase"> ₹{{purchase.amount}} </td>
        </ng-container>

        <!-- Status Column -->
        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef> Status </th>
          <td mat-cell *matCellDef="let purchase">
            <span [ngClass]="purchase.status.toLowerCase()">{{purchase.status}}</span>
          </td>
        </ng-container>

        <!-- Actions Column -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef> Actions </th>
          <td mat-cell *matCellDef="let purchase">
            <button mat-button color="primary">
              <mat-icon>receipt</mat-icon> Invoice
            </button>
            <button mat-button>
              <mat-icon>visibility</mat-icon> Details
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </mat-card-content>
  </mat-card>
</div>
