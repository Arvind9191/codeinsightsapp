<mat-sidenav-container class="sidenav-container">
  <!-- Sidebar -->
  <mat-sidenav #drawer class="sidebar" [mode]="isMobile ? 'over' : 'side'" [(opened)]="opened">
    <mat-nav-list>
      <a mat-list-item routerLink="/admin/admindashboard" class="nav-item">
        <mat-icon class="nav-icon">insights</mat-icon>
        <span class="nav-text">Dashboard</span>
      </a>
      <a mat-list-item routerLink="/admin/adminuser" class="nav-item">
        <mat-icon class="nav-icon">people</mat-icon>
        <span class="nav-text">Users</span>
      </a>
      <a mat-list-item routerLink="/admin/projectupload" class="nav-item">
        <mat-icon class="nav-icon">folder</mat-icon>
        <span class="nav-text">Upload</span>
      </a>
      <a mat-list-item routerLink="/admin/adminproject" class="nav-item">
        <mat-icon class="nav-icon">folder</mat-icon>
        <span class="nav-text">Projects</span>
      </a>
      <a mat-list-item routerLink="/sales" class="nav-item">
        <mat-icon class="nav-icon">bar_chart</mat-icon>
        <span class="nav-text">Sales</span>
      </a>
      <a mat-list-item routerLink="/offers" class="nav-item">
        <mat-icon class="nav-icon">local_offer</mat-icon>
        <span class="nav-text">Offers</span>
      </a>
      <a mat-list-item routerLink="/settings" class="nav-item">
        <mat-icon class="nav-icon">settings</mat-icon>
        <span class="nav-text">Settings</span>
      </a>
       <a  (click)="logout()" mat-list-item  class="nav-item">
        <mat-icon class="nav-icon">settings</mat-icon>
        <span class="nav-text">Settings</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <!-- Main Content -->
  <mat-sidenav-content>
    <!-- Top bar with hamburger -->
    <mat-toolbar color="primary">
      <button mat-icon-button (click)="drawer.toggle()" class="menu-button">
        <mat-icon>menu</mat-icon>
      </button>
      <span>Admin Dashboard</span>
    </mat-toolbar>

    <div class="content">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
