<div class="user-table-container">
  <h2>Users</h2>

  <!-- Controls row -->
  <div class="controls">
    <mat-form-field appearance="outline" class="search-box">
      <mat-label>Search</mat-label>
      <input matInput (keyup)="applyFilter($event)" placeholder="Search by name or email">
    </mat-form-field>

    <mat-form-field appearance="outline" class="filter-box">
      <mat-label>Email Verification</mat-label>
      <mat-select (selectionChange)="filterByVerification($event.value)">
        <mat-option value="">All</mat-option>
        <mat-option value="true">Verified</mat-option>
        <mat-option value="false">Not Verified</mat-option>
      </mat-select>
    </mat-form-field>
  </div>

  <!-- Table -->
  <div class="table-wrapper">
    <table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z8">

      <!-- Sr No -->
      <ng-container matColumnDef="srNo">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Sr No </th>
        <td mat-cell *matCellDef="let user"> {{user.srNo}} </td>
      </ng-container>

      <!-- Email -->
      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Email </th>
        <td mat-cell *matCellDef="let user"> {{user.email}} </td>
      </ng-container>

      <!-- Name -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Name </th>
        <td mat-cell *matCellDef="let user"> {{user.name}} </td>
      </ng-container>

      <!-- Registered Date -->
      <ng-container matColumnDef="registeredDate">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Registered Date </th>
        <td mat-cell *matCellDef="let user"> {{user.registeredDate | date:'short'}} </td>
      </ng-container>

      <!-- Email Verified -->
      <ng-container matColumnDef="isVerified">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Verified </th>
        <td mat-cell *matCellDef="let user">
          <span [ngClass]="user.isVerified ? 'verified' : 'not-verified'">
            {{user.isVerified ? 'Verified' : 'Not Verified'}}
          </span>
        </td>
      </ng-container>

      <!-- Action -->
      <ng-container matColumnDef="action">
        <th mat-header-cell *matHeaderCellDef> Action </th>
        <td mat-cell *matCellDef="let user">
          <button mat-raised-button color="primary" (click)="viewMore(user)">View More</button>
        </td>
      </ng-container>

      <!-- Header & Row -->
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>

  <!-- Pagination -->
  <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons></mat-paginator>
</div>
