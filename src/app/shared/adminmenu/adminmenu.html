 <header class="header">
  <div class="header-container"> 
    <div class="logo">
     <a routerLink="home">Project Library</a>
    </div> 
    <button class="menu-toggle" (click)="toggleMenu()" aria-label="Toggle navigation">
      <svg viewBox="0 0 24 24" width="24" height="24">
        <path fill="currentColor" d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
      </svg>
    </button>
 
    <nav class="nav-menu" [class.active]="isMenuOpen">
      <ul class="nav-list">         
        <li><a routerLink="/projects" class="nav-link">Project</a></li>
        <li><a routerLink="/contact" class="nav-link">Contact</a></li>
        <li><a routerLink="uploadproject" class="nav-link">Upload Project</a></li>
      </ul>
    </nav> 
    <div class="right-actions-group">
      <a routerLink="login" class="login-btn"(click)="openLoginPopup()" >Login</a>
       <a routerLink="signup" class="login-btn"(click)="opensignuppopup()" >Sign-Up</a>
      <div class="profile-container" [class.dropdown-active]="isProfileOpen">
        <button class="profile-btn" (click)="toggleProfile($event)" aria-label="Toggle profile menu">
          <span class="profile-avatar">
             <img/>
          </span>
          <span class="profile-text">arvindkumarsarsawan</span>
        </button> 
        <ul class="profile-dropdown">
          <li><a routerLink="#" class="dropdown-item">Settings</a></li>
          <li><a routerLink="#" class="dropdown-item">Change Password</a></li>
          <li class="divider"></li>
          <li><a routerLink="#" class="dropdown-item logout-link">Logout</a></li>
        </ul>
      </div>
    </div> 
  </div>
</header>
