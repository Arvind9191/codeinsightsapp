<!-- loader.component.html -->
<div class="loader" [class.show]="isLoading$ | async">
<div class="spinner-container">
    <!-- SVG with 12 evenly distributed rounded spokes -->
   <svg class="simple-spinner" viewBox="0 0 100 100" full="none" stroke-width="4">
  <line x1="50" y1="15" x2="50" y2="30" stroke="#007bff" />
  <line x1="50" y1="15" x2="50" y2="30" stroke="#007bff" transform="rotate(30 50 50)" />
  <line x1="50" y1="15" x2="50" y2="30" stroke="#007bff" transform="rotate(60 50 50)" />
  <line x1="50" y1="15" x2="50" y2="30" stroke="#007bff" transform="rotate(90 50 50)" />
  <line x1="50" y1="15" x2="50" y2="30" stroke="#007bff" transform="rotate(120 50 50)" />
  <line x1="50" y1="15" x2="50" y2="30" stroke="#007bff" transform="rotate(150 50 50)" />
  <line x1="50" y1="15" x2="50" y2="30" stroke="#007bff" transform="rotate(180 50 50)" />
  <line x1="50" y1="15" x2="50" y2="30" stroke="#007bff" transform="rotate(210 50 50)" />
  <line x1="50" y1="15" x2="50" y2="30" stroke="#007bff" transform="rotate(240 50 50)" />
  <line x1="50" y1="15" x2="50" y2="30" stroke="#007bff" transform="rotate(270 50 50)" />
  <line x1="50" y1="15" x2="50" y2="30" stroke="#007bff" transform="rotate(300 50 50)" />
  <line x1="50" y1="15" x2="50" y2="30" stroke="#007bff" transform="rotate(330 50 50)" />
</svg>
    <div class="loading-text">Loading...</div>
  </div>
</div>
