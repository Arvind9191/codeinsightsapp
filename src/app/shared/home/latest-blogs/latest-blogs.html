<section class="blog-section">

    <div class="section-header">

        <span class="section-badge">
            Latest Articles
        </span>

        <h2>Learn, Build & Grow</h2>

        <p>
            Read practical tutorials, project setup guides, coding tips,
            and software development articles from our WordPress blog.
        </p>

    </div>

    <div class="blog-grid">

        <mat-card class="blog-card" *ngFor="let blog of blogs">

            <div class="blog-image">

                <img [src]="blog.image" [alt]="blog.title" alt="">

                <span class="category">
                    {{blog.category}}
                </span>

            </div>

            <mat-card-content>

                <div class="blog-meta">

                    <span>
                        <mat-icon>schedule</mat-icon>
                        {{blog.readTime}}
                    </span>

                    <span>
                        <mat-icon>calendar_today</mat-icon>
                        {{blog.date}}
                    </span>

                </div>

                <h3>
                    {{blog.title}}
                </h3>

                <p>
                    {{blog.description}}
                </p>

            </mat-card-content>

            <mat-divider></mat-divider>

            <mat-card-actions>

                <button
                    mat-button
                    color="primary">

                    Read Article

                    <mat-icon>
                        arrow_forward
                    </mat-icon>

                </button>

            </mat-card-actions>

        </mat-card>

    </div>

    <div class="view-all">

        <button
            mat-stroked-button
            color="primary">

            View All Articles

        </button>

    </div>

</section>
