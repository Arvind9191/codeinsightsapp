<section class="faq-section">

    <div class="section-header">

        <span class="section-badge">
            FAQ
        </span>

        <h2>
            Frequently Asked Questions
        </h2>

        <p>
            Find answers to the most common questions about purchasing,
            downloading and using our student projects.
        </p>

    </div>

    <div class="faq-container">

        <mat-accordion multi="false">

            <mat-expansion-panel *ngFor="let faq of faqs">

                <mat-expansion-panel-header>

                    <mat-panel-title>

                        {{faq.question}}

                    </mat-panel-title>

                </mat-expansion-panel-header>

                <p>

                    {{faq.answer}}

                </p>

            </mat-expansion-panel>

        </mat-accordion>

    </div>

    <div class="faq-footer">

        <h3>
            Still have questions?
        </h3>

        <p>
            Our support team is here to help you choose the right project.
        </p>

        <button
            mat-flat-button
            color="primary">

            Contact Support

        </button>

    </div>

</section>
